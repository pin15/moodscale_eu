<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 210" fill="none" aria-hidden="true"
     class="ms-branch-svg" data-corner="tl">
  <!-- woody branch sweeping in from the top-left corner -->
  <path class="ms-stem"
        d="M-6 -6 C 46 22 86 40 120 86 C 138 110 150 140 158 176"
        stroke="#5b4a32" stroke-width="5" stroke-linecap="round" fill="none" opacity=".85"/>
  <path class="ms-stem"
        d="M58 30 C 86 30 104 46 118 70 M104 64 C 126 70 142 88 150 116"
        stroke="#5b4a32" stroke-width="3" stroke-linecap="round" fill="none" opacity=".7"/>

  <!-- placement on .ms-leaf; the sway rotate rides on the inner .ms-sway so they compose -->
  <g class="ms-leaf" transform="translate(40 24) rotate(-38)"><g class="ms-sway"><use href="#ms-leaf-shape"/></g></g>
  <g class="ms-leaf" transform="translate(70 30) rotate(-8)"><g class="ms-sway"><use href="#ms-leaf-shape"/></g></g>
  <g class="ms-leaf" transform="translate(96 52) rotate(24)"><g class="ms-sway"><use href="#ms-leaf-shape"/></g></g>
  <g class="ms-leaf" transform="translate(118 78) rotate(52)"><g class="ms-sway"><use href="#ms-leaf-shape"/></g></g>
  <g class="ms-leaf" transform="translate(132 108) rotate(70)"><g class="ms-sway"><use href="#ms-leaf-shape"/></g></g>
  <g class="ms-leaf" transform="translate(146 142) rotate(88)"><g class="ms-sway"><use href="#ms-leaf-shape"/></g></g>
  <g class="ms-leaf" transform="translate(112 58) rotate(8) scale(.78)"><g class="ms-sway"><use href="#ms-leaf-shape"/></g></g>
  <g class="ms-leaf" transform="translate(150 116) rotate(116) scale(.82)"><g class="ms-sway"><use href="#ms-leaf-shape"/></g></g>

  <!-- shared leaf geometry: tip up, stem at the bottom (origin 50% 100% sways from the stalk) -->
  <defs>
    <g id="ms-leaf-shape">
      <path d="M0 10 C -13 0 -13 -26 0 -38 C 13 -26 13 0 0 10 Z"
            fill="#6f9a5b"/>
      <path d="M0 10 C -13 0 -13 -26 0 -38 C 13 -26 13 0 0 10 Z"
            fill="url(#ms-leaf-grad)" opacity=".55"/>
      <path d="M0 8 L0 -34" stroke="#3f6b40" stroke-width="1.2" opacity=".5"/>
    </g>
    <linearGradient id="ms-leaf-grad" x1="0" y1="10" x2="0" y2="-38" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3f6b40"/>
      <stop offset="1" stop-color="#9cbe84"/>
    </linearGradient>
  </defs>
</svg>
