    <path d="M20 12 C 13 4 6 4 1 9" stroke="#3a4a3f" stroke-width="2" stroke-linecap="round" fill="none"/>
  </g>
  <g class="ms-bird-wing ms-bird-wing--r" style="transform-origin:20px 12px">
    <path d="M20 12 C 27 4 34 4 39 9" stroke="#3a4a3f" stroke-width="2" stroke-linecap="round" fill="none"/>
  </g>
</svg>
