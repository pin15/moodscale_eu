<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 24" fill="none" aria-hidden="true" class="ms-bird-svg">
  <!-- simple 2-stroke gull; wings are split into two groups so they can flap (scaleY) -->
